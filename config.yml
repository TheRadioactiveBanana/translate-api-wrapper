# FishTranslateAPI example configuration

# Web server address and port
host: "0.0.0.0"
port: 8080

# API token used by AuthFilter (header: token)
token: "example-token"

# Maximum request body length for /api/translate
max-size: 2000

# Enabled translation backends
google: true
deepl: false
deepl-auth-key: ""
libre: false
libre-url: "https://translate.eradication.fun/translate"
llm: false
llm-url: "http://127.0.0.1:8081/v1/chat/completions"
llm-max-tokens: 256

# Translation cache
cache:
  # "memory" (default) or "db"
  type: "memory"
  # Maximum number of cached translation entries
  max-entries: 1000
  # TTL in minutes before a cached value expires
  expire-minutes: 10

# Persistent translation cache (MongoDB), used when cache.type = "db"
db:
  uri: "mongodb://localhost:27017"
  database: "fish"

# Global rate limiting
# defaults if omitted: spacing-ms=1000, cap=5, max-entries=1000, expire-minutes=1
rate-limit:
  spacing-ms: 1000
  cap: 5
  max-entries: 1000
  expire-minutes: 1

# Trust proxy forwarding headers for client IP resolution.
# Enable this when running behind nginx or another reverse proxy that overwrites these headers.
proxy:
  enabled: false
